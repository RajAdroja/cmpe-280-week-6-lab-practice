<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Week 6 Demo</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin: 2rem; }
      .card { padding: 1rem; border: 1px solid #e5e7eb; border-radius: 12px; max-width: 640px; }
      .row { display:flex; gap: 1rem; align-items:center; }
      .space-y > * + * { margin-top: .75rem; }
    </style>
    <!-- React 18 + ReactDOM UMD -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <!-- Babel for in-browser JSX transform (teaching/demo only) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Emotion + MUI UMD -->
    <script src="https://unpkg.com/@emotion/react@11.11.4/dist/emotion-react.umd.min.js"></script>
    <script src="https://unpkg.com/@emotion/styled@11.11.5/dist/emotion-styled.umd.min.js"></script>
    <script src="https://unpkg.com/@mui/material@5.15.14/umd/material-ui.development.js"></script>
  </head>
  <body>
    <div id="root"></div>

<script type="text/babel">
const root = ReactDOM.createRoot(document.getElementById('root'));
const { Button, TextField, Stack, Typography } = MaterialUI;

/**
 * TODO:
 * 1) Replace the plain inputs with MUI <TextField> components.
 * 2) Add an MUI <Button> to submit.
 * 3) Disable the button until both fields are non-empty.
 */

function App(){
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");

  const canSubmit = email !== "" && password !== "";

  return (
    <div className="card">
      <Typography variant="h5" gutterBottom>02 — Login (Student)</Typography>
      <div className="space-y">
        <TextField label="Email" value={email} onChange={e=>setEmail(e.target.value)} />
        <TextField label="Password" type="password" value={password} onChange={e=>setPassword(e.target.value)} />
        <Button variant="contained" disabled={!canSubmit}>Sign In</Button>
      </div>
    </div>
  );
}

root.render(<App />);
</script>

  </body>
</html>
